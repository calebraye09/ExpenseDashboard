<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Expense Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #f0f2f5;
      --surface:   #ffffff;
      --border:    #e2e6ea;
      --accent:    #2563eb;
      --accent2:   #1d4ed8;
      --success:   #16a34a;
      --danger:    #dc2626;
      --text:      #1e293b;
      --muted:     #94a3b8;
      --income:    #16a34a;
      --expense:   #dc2626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      min-height: 100vh;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    #periodLabel {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* ── PERIOD SELECTOR ── */
    .period-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .preset-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 2px;
    }

    .preset-btn {
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .preset-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .custom-range {
      display: none;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }

    .custom-range.visible { display: flex; }

    .custom-range input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text);
      background: var(--bg);
    }

    .custom-range span { color: var(--muted); font-size: 11px; }

    .go-btn {
      padding: 6px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* ── SUMMARY STRIP ── */
    .summary-strip {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .summary-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .s-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .s-value {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
    }

    .s-value.income  { color: var(--income); }
    .s-value.expense { color: var(--expense); }
    .s-value.net-pos { color: var(--income); }
    .s-value.net-neg { color: var(--expense); }

    /* ── BAR CHART ── */
    .bar-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .bar-label {
      width: 110px;
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 12px;
      background: var(--bg);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    /* Budget reference line — commented out until budget feature is built
    .budget-line {
      position: absolute;
      top: 0;
      height: 100%;
      width: 2px;
      background: rgba(0,0,0,0.25);
      z-index: 2;
    }
    */

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease;
    }

    .bar-value {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text);
      width: 55px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── PIE CHART ── */
    .pie-container {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .pie-legend {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-name {
      flex: 1;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .legend-pct {
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      font-size: 10px;
    }

    /* ── ACCOUNT FLOW ── */
    .account-row { margin-bottom: 14px; }
    .account-row:last-child { margin-bottom: 0; }

    .account-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .flow-bars { display: flex; flex-direction: column; gap: 4px; }

    .flow-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .flow-label {
      width: 28px;
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .flow-label.in  { color: var(--income); }
    .flow-label.out { color: var(--expense); }

    .flow-track {
      flex: 1;
      height: 10px;
      background: var(--bg);
      border-radius: 5px;
      overflow: hidden;
    }

    .flow-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.5s ease;
    }

    .flow-fill.in  { background: var(--income); }
    .flow-fill.out { background: var(--expense); }

    .flow-amount {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      width: 55px;
      text-align: right;
      flex-shrink: 0;
    }

    .flow-amount.in  { color: var(--income); }
    .flow-amount.out { color: var(--expense); }

    .account-net {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      margin-top: 4px;
      text-align: right;
    }

    /* ── RECENT TRANSACTIONS ── */
    .tx-row {
      display: grid;
      grid-template-columns: 36px 14px 65px 1fr 70px;
      gap: 6px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .tx-row:last-child { border-bottom: none; }

    .tx-date {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .tx-type {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 600;
    }

    .tx-type.E { color: var(--expense); }
    .tx-type.I { color: var(--income); }

    .tx-category {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tx-vendor {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tx-cost {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-align: right;
    }

    .tx-cost.E { color: var(--expense); }
    .tx-cost.I { color: var(--income); }

    /* ── REIMBURSABLES ── */
    .reimb-row {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      transition: opacity 0.3s;
    }

    .reimb-row:last-child { border-bottom: none; }

    .reimb-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .reimb-info { flex: 1; }

    .reimb-vendor {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .reimb-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .reimb-tag {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      margin-right: 6px;
    }

    .reimb-tag.owed { background: #fef2f2; color: var(--expense); }
    .reimb-tag.owe  { background: #f0fdf4; color: var(--income); }

    .reimb-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
      margin-left: 10px;
    }

    .reimb-cost {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
    }

    .reimb-cost.owed { color: var(--income); }
    .reimb-cost.owe  { color: var(--expense); }

    .done-btn {
      padding: 4px 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .done-btn:hover    { background: var(--accent2); }
    .done-btn:disabled { background: var(--muted); cursor: default; }

    /* ── LOADING / ERROR ── */
    .state {
      text-align: center;
      padding: 24px 20px;
      color: var(--muted);
      font-size: 12px;
    }

    .state.error { color: var(--expense); }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .refresh-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      margin-top: 4px;
    }

    .refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .empty-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 10px 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>Expenses</h1>
    <span id="periodLabel"></span>
  </header>

  <div class="period-bar">
    <div class="preset-row">
      <button class="preset-btn active" data-preset="thisMonth">This Month</button>
      <button class="preset-btn" data-preset="lastMonth">Last Month</button>
      <button class="preset-btn" data-preset="last7">Last 7 Days</button>
      <button class="preset-btn" data-preset="last30">Last 30 Days</button>
      <button class="preset-btn" data-preset="custom">Custom</button>
    </div>
    <div class="custom-range" id="customRange">
      <input type="text" id="startDate" placeholder="M-D-YYYY">
      <span>to</span>
      <input type="text" id="endDate" placeholder="M-D-YYYY">
      <button class="go-btn" onclick="loadCustom()">Go</button>
    </div>
  </div>

  <div id="app">
    <div class="state">
      <div class="spinner"></div>
      <div>Fetching data...</div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbygCLknnrL2rNz8tU-qgIveO1mi_vqaX61n1YET-oHFqs4nTRgdoCIvCn7N4j1gz0yz/exec";

    const COLORS = [
      "#2563eb","#f59e0b","#10b981","#ef4444","#8b5cf6",
      "#ec4899","#06b6d4","#84cc16","#f97316","#6366f1"
    ];

    let currentParams = "?preset=thisMonth";

    document.querySelectorAll(".preset-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const preset = btn.dataset.preset;
        if (preset === "custom") {
          document.getElementById("customRange").classList.add("visible");
        } else {
          document.getElementById("customRange").classList.remove("visible");
          loadData(`?preset=${preset}`);
        }
      });
    });

    function loadCustom() {
      const start = document.getElementById("startDate").value.trim();
      const end   = document.getElementById("endDate").value.trim();
      if (!start || !end) return;
      loadData(`?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`);
    }

    function xhr(url, cb) {
      const req     = new XMLHttpRequest();
      const timeout = setTimeout(() => req.abort(), 20000);
      req.open("GET", url, true);
      req.onreadystatechange = function() {
        if (req.readyState !== 4) return;
        clearTimeout(timeout);
        if (req.status === 200) {
          try { cb(null, JSON.parse(req.responseText)); }
          catch(e) { cb(e); }
        } else {
          cb(new Error(`HTTP ${req.status}`));
        }
      };
      req.onerror = () => { clearTimeout(timeout); cb(new Error("Network error")); };
      req.send();
    }

    function loadData(params) {
      currentParams = params;
      const app = document.getElementById("app");
      app.innerHTML = `<div class="state"><div class="spinner"></div><div>Fetching data...</div></div>`;

      const url = `${SCRIPT_URL}?action=getPageData${params.replace("?","&")}`;
      xhr(url, (err, data) => {
        if (err) {
          app.innerHTML = `
            <div class="state error">Failed to load: ${err.message}</div>
            <button class="refresh-btn" onclick="loadData('${params}')">↺ Retry</button>`;
          return;
        }
        renderDashboard(data);
        loadReimbursables();
      });
    }

    function loadReimbursables() {
      xhr(`${SCRIPT_URL}?action=getReimbursables`, (err, data) => {
        if (!err) renderReimbursables(data);
      });
    }

    function renderDashboard(data) {
      const { recent, categoryTotals, accountFlow, paycheckTotal, otherIncome, totalExpenses, totalIncome, periodLabel } = data;
      document.getElementById("periodLabel").textContent = periodLabel;

      const app = document.getElementById("app");
      app.innerHTML = "";

      // ── Summary strip ──
      const net    = totalIncome - totalExpenses;
      const netCls = net >= 0 ? "net-pos" : "net-neg";
      const strip  = mk("div", "summary-strip");
      strip.innerHTML = `
        <div class="summary-tile"><div class="s-label">Income</div><div class="s-value income">$${fmt(totalIncome)}</div></div>
        <div class="summary-tile"><div class="s-label">Expenses</div><div class="s-value expense">$${fmt(totalExpenses)}</div></div>
        <div class="summary-tile"><div class="s-label">Net</div><div class="s-value ${netCls}">${net>=0?"+":""}$${fmt(net)}</div></div>
      `;
      app.appendChild(strip);

      // ── Category bar chart ──
      const sorted = Object.entries(categoryTotals).sort((a,b) => b[1]-a[1]);
      if (sorted.length > 0) {
        const card = mkCard("Spending by Category");
        const max  = sorted[0][1];
        sorted.forEach(([cat, amt], i) => {
          const row = mk("div", "bar-row");
          row.innerHTML = `
            <div class="bar-label">${cat}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:0%;background:${COLORS[i%COLORS.length]}" data-w="${(amt/max)*100}"></div>
              <!-- Budget reference: uncomment and replace BUDGET_PCT with (budget/max)*100 when budgets are configured
              <div class="budget-line" style="left:BUDGET_PCT%"></div> -->
            </div>
            <div class="bar-value">$${fmt(amt)}</div>`;
          card.appendChild(row);
        });
        app.appendChild(card);
        animateBars(".bar-fill");
      }

      // ── Pie chart ──
      if (sorted.length > 0) {
        const card   = mkCard("Distribution");
        const wrap   = mk("div", "pie-container");
        const canvas = document.createElement("canvas");
        canvas.width = 120; canvas.height = 120;
        const legend = mk("div", "pie-legend");
        sorted.forEach(([cat, amt], i) => {
          const pct = totalExpenses > 0 ? ((amt/totalExpenses)*100).toFixed(1) : 0;
          const li  = mk("div", "legend-item");
          li.innerHTML = `
            <div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div>
            <div class="legend-name">${cat}</div>
            <div class="legend-pct">${pct}%</div>`;
          legend.appendChild(li);
        });
        wrap.appendChild(canvas);
        wrap.appendChild(legend);
        card.appendChild(wrap);
        app.appendChild(card);
        drawPie(canvas, sorted, totalExpenses);
      }

      // ── Account flow ──
      const accounts = Object.entries(accountFlow);
      if (accounts.length > 0) {
        const card    = mkCard("Account Flow");
        const maxFlow = Math.max(...accounts.map(([,v]) => Math.max(v.in, v.out)));
        accounts.forEach(([acct, flow]) => {
          const net    = flow.in - flow.out;
          const netCls = net >= 0 ? "color:var(--income)" : "color:var(--expense)";
          const row    = mk("div", "account-row");
          row.innerHTML = `
            <div class="account-name">${acct}</div>
            <div class="flow-bars">
              <div class="flow-row">
                <div class="flow-label in">IN</div>
                <div class="flow-track"><div class="flow-fill in" style="width:0%" data-w="${(flow.in/maxFlow)*100}"></div></div>
                <div class="flow-amount in">$${fmt(flow.in)}</div>
              </div>
              <div class="flow-row">
                <div class="flow-label out">OUT</div>
                <div class="flow-track"><div class="flow-fill out" style="width:0%" data-w="${(flow.out/maxFlow)*100}"></div></div>
                <div class="flow-amount out">$${fmt(flow.out)}</div>
              </div>
            </div>
            <div class="account-net" style="${netCls}">Net: ${net>=0?"+":""}$${flow.in>0||flow.out>0?Math.abs(net).toFixed(2):"0.00"}</div>`;
          card.appendChild(row);
        });
        app.appendChild(card);
        animateBars(".flow-fill");
      }

      // ── Income breakdown ──
      if (paycheckTotal > 0 || otherIncome > 0) {
        const card   = mkCard("Income Breakdown");
        const maxInc = Math.max(paycheckTotal, otherIncome) || 1;
        [["Paycheck", paycheckTotal, "#2563eb"], ["Other Income", otherIncome, "#10b981"]].forEach(([label, amt, color]) => {
          if (amt === 0) return;
          const row = mk("div", "bar-row");
          row.innerHTML = `
            <div class="bar-label">${label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:0%;background:${color}" data-w="${(amt/maxInc)*100}"></div></div>
            <div class="bar-value">$${fmt(amt)}</div>`;
          card.appendChild(row);
        });
        app.appendChild(card);
        animateBars(".bar-fill");
      }

      // ── Recent transactions ──
      const txCard = mkCard("Recent Transactions");
      if (!recent || recent.length === 0) {
        txCard.innerHTML += `<div class="empty-note">No transactions in this period</div>`;
      } else {
        recent.forEach(tx => {
          const t   = tx.type === "Income" ? "I" : "E";
          const row = mk("div", "tx-row");
          row.innerHTML = `
            <div class="tx-date">${tx.date}</div>
            <div class="tx-type ${t}">${t}</div>
            <div class="tx-category">${tx.category}</div>
            <div class="tx-vendor">${tx.vendor||"—"}</div>
            <div class="tx-cost ${t}">$${tx.cost.toFixed(2)}</div>`;
          txCard.appendChild(row);
        });
      }
      app.appendChild(txCard);

      // Reimbursables placeholder
      const rCard = mk("div", "card");
      rCard.id = "reimbCard";
      rCard.innerHTML = `<div class="card-title">Reimbursables</div><div class="state"><div class="spinner"></div></div>`;
      app.appendChild(rCard);

      // Refresh
      const btn = document.createElement("button");
      btn.className = "refresh-btn";
      btn.textContent = "↺  Refresh";
      btn.onclick = () => loadData(currentParams);
      app.appendChild(btn);
    }

    function renderReimbursables(list) {
      const card = document.getElementById("reimbCard");
      if (!card) return;
      card.innerHTML = `<div class="card-title">Reimbursables</div>`;
      if (!list || list.length === 0) {
        card.innerHTML += `<div class="empty-note">No outstanding reimbursables ✓</div>`;
        return;
      }
      list.forEach(tx => {
        const isOwed  = tx.type === "Expense";
        const tagCls  = isOwed ? "owed" : "owe";
        const tagText = isOwed ? "Owed to you" : "You owe";
        const costCls = isOwed ? "owed" : "owe";
        const row     = mk("div", "reimb-row");
        row.innerHTML = `
          <div class="reimb-top">
            <div class="reimb-info">
              <div class="reimb-vendor">${tx.vendor||"—"}</div>
              <div class="reimb-meta">
                <span class="reimb-tag ${tagCls}">${tagText}</span>
                ${tx.date} · ${tx.category} · ${tx.account}
              </div>
            </div>
            <div class="reimb-right">
              <div class="reimb-cost ${costCls}">$${tx.cost.toFixed(2)}</div>
              <button class="done-btn" onclick="settle('${tx.timestamp.replace(/'/g,"\\'")}', this)">Done</button>
            </div>
          </div>`;
        card.appendChild(row);
      });
    }

    function settle(timestamp, btn) {
      btn.disabled    = true;
      btn.textContent = "...";
      xhr(`${SCRIPT_URL}?action=settleTransaction&timestamp=${encodeURIComponent(timestamp)}`, (err, res) => {
        if (!err && res.success) {
          btn.closest(".reimb-row").style.opacity = "0.3";
          btn.textContent = "✓";
        } else {
          btn.disabled    = false;
          btn.textContent = "Retry";
        }
      });
    }

    function drawPie(canvas, sorted, total) {
      const ctx = canvas.getContext("2d");
      const cx  = canvas.width / 2;
      const cy  = canvas.height / 2;
      const r   = cx - 6;
      if (!total) return;
      let start = -Math.PI / 2;
      sorted.forEach(([, amt], i) => {
        const slice = (amt / total) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, start + slice);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
        start += slice;
      });
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = "#fff";
      ctx.fill();
    }

    function animateBars(selector) {
      setTimeout(() => {
        document.querySelectorAll(selector).forEach(b => {
          if (b.dataset.w) b.style.width = b.dataset.w + "%";
        });
      }, 60);
    }

    function mk(tag, cls) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      return e;
    }

    function mkCard(title) {
      const c = mk("div", "card");
      c.innerHTML = `<div class="card-title">${title}</div>`;
      return c;
    }

    function fmt(n) {
      return Math.abs(n).toFixed(0);
    }

    loadData("?preset=thisMonth");
  </script>
</body>
